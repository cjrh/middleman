host = "127.0.0.1"
port = 8091
data_dir = "/data/member-ssh"
sync_interval = "1h"
github_token_env = "MIDDLEMAN_GITHUB_TOKEN_UNSET_FOR_FLEET_E2E"

[activity]
view_mode = "threaded"
time_range = "7d"

[terminal]
renderer = "xterm"

[fleet]
key = "member-ssh"
peer_timeout = "1s"

[[agents]]
key = "drive-helper"
label = "Drive helper"
command = ["sh", "-lc", "printf drive-helper-ready; sleep 300"]

[[agents]]
key = "ssh-interactive-helper"
label = "SSH interactive helper"
command = ["sh", "-lc", "printf ssh-helper-ready; while IFS= read -r line; do printf 'ssh:%s\n' \"$line\"; done"]
