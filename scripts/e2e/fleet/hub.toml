host = "127.0.0.1"
port = 8091
data_dir = "/data/hub"
sync_interval = "1h"
github_token_env = "MIDDLEMAN_GITHUB_TOKEN_UNSET_FOR_FLEET_E2E"

[activity]
view_mode = "threaded"
time_range = "7d"

[terminal]
renderer = "xterm"

[fleet]
key = "hub"
peer_timeout = "1s"

[[fleet.peers]]
key = "member"
name = "member"
base_url = "http://member:18091"

[[fleet.peers]]
key = "down"
name = "down"
base_url = "http://127.0.0.1:1"

[[fleet.ssh_peers]]
key = "member-ssh"
name = "member-ssh"
destination = "root@member-ssh"
remote_command = "/app/scripts/e2e/fleet/remote-middleman-member-ssh.sh"
